
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>건설안전관리자 포털</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; }
        .page-section { display: none; }
        .active-section { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="text-slate-800">

    <header class="bg-blue-800 text-white p-4 shadow-md">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg"><i class="fa-solid fa-helmet-safety mr-2"></i>안전관리 포털</h1>
            <nav class="space-x-4">
                <button onclick="showPage('home')">홈</button>
                <button onclick="showPage('notice')">공지</button>
                <button onclick="showPage('board')">게시판</button>
            </nav>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 mt-4">
        
        <section id="home" class="page-section active-section">
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h2 class="text-xl font-bold mb-4">현장 현황</h2>
                <div class="bg-green-100 p-4 rounded text-green-800 font-bold">무재해 342일 달성 중!</div>
            </div>
        </section>

        <section id="notice" class="page-section">
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h2 class="text-xl font-bold mb-4">공지사항</h2>
                <ul class="list-disc pl-5 space-y-2">
                    <li>하절기 폭염 대비 근로자 휴식 준수 안내</li>
                    <li>7월 정기 안전보건교육 일정 공유</li>
                </ul>
            </div>
        </section>

        <section id="board" class="page-section">
            <div class="bg-white p-6 rounded-lg shadow-sm">
                <h2 class="text-xl font-bold mb-4">안전 업무 게시판</h2>
                <div id="board-content" class="space-y-2">내용이 없습니다.</div>
                <button onclick="addPost()" class="mt-4 bg-blue-600 text-white px-4 py-2 rounded text-sm">글쓰기</button>
            </div>
        </section>
    </main>

    <script>
        // 페이지 전환 함수
        function showPage(id) {
            document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active-section'));
            document.getElementById(id).classList.add('active-section');
        }

        // 간단한 글쓰기 함수
        function addPost() {
            const title = prompt("게시글 제목을 입력하세요:");
            if(title) {
                const board = document.getElementById('board-content');
                const p = document.createElement('p');
                p.className = "border-b pb-2";
                p.textContent = "작성일: " + new Date().toLocaleDateString() + " | " + title;
                board.appendChild(p);
            }
        }
    </script>
</body>
</html>
